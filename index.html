<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClipScholar</title>
<style>
body { margin: 0; font-family: sans-serif; background: #0f0f13; color: #f0f0f5; min-height: 100vh; }
header { padding: 20px 32px; border-bottom: 1px solid #2a2a38; display: flex; align-items: center; gap: 12px; }
.logo { font-size: 22px; font-weight: 700; }
.hero { max-width: 720px; margin: 80px auto 0; padding: 0 24px; text-align: center; }
.hero h1 { font-size: 42px; font-weight: 700; margin-bottom: 16px; color: #a78bfa; }
.hero p { color: #8888a0; font-size: 18px; margin-bottom: 48px; }
.card { background: #1a1a22; border: 1px solid #2a2a38; border-radius: 12px; padding: 32px; max-width: 720px; margin: 0 auto 48px; }
.row { display: flex; gap: 12px; margin-bottom: 16px; }
input { flex: 1; background: #0f0f13; border: 1px solid #2a2a38; border-radius: 8px; padding: 14px 18px; color: #f0f0f5; font-size: 15px; outline: none; }
input:focus { border-color: #7c6cfa; }
button { background: #7c6cfa; color: white; border: none; border-radius: 8px; padding: 14px 28px; font-size: 15px; font-weight: 600; cursor: pointer; }
button:disabled { opacity: 0.5; cursor: not-allowed; }
.msg { display: none; padding: 12px 16px; border-radius: 8px; font-size: 14px; margin-top: 8px; }
.msg.show { display: block; }
.processing { background: rgba(124,108,250,0.1); border: 1px solid rgba(124,108,250,0.3); color: #a78bfa; }
.error { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); color: #f87171; }
.clips { max-width: 900px; margin: 0 auto 80px; padding: 0 24px; display: none; }
.clips h2 { font-size: 22px; margin-bottom: 24px; }
.clip-card { background: #1a1a22; border: 1px solid #2a2a38; border-radius: 12px; overflow: hidden; margin-bottom: 20px; }
.clip-card video { width: 100%; display: block; max-height: 400px; }
.clip-info { padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; }
.clip-title { font-size: 16px; font-weight: 600; }
.clip-time { font-size: 13px; color: #8888a0; margin-top: 4px; }
.dl-btn { background: #22222e; border: 1px solid #2a2a38; border-radius: 8px; padding: 8px 16px; color: #f0f0f5; font-size: 13px; text-decoration: none; }
</style>
</head>
<body>
<header><div class="logo">✂ ClipScholar</div></header>
<div class="hero">
  <h1>Turn long videos into focused clips</h1>
  <p>Paste any YouTube link. Get one short clip per topic.</p>
</div>
<div class="card">
  <div class="row">
    <input type="text" id="url" placeholder="https://www.youtube.com/watch?v=..." />
    <button id="btn" onclick="go()">Process Video</button>
  </div>
  <div class="msg processing" id="pmsg">Processing your video — this takes 2-3 minutes...</div>
  <div class="msg error" id="emsg">Error occurred. Please try again.</div>
</div>
<div class="clips" id="clips">
  <h2 id="clips-title">Your Study Clips</h2>
  <div id="clips-grid"></div>
</div>
<script>
const SERVER = 'https://step-nimbly-antacid.ngrok-free.dev';
const MAKE = 'https://hook.eu1.make.com/tcdmsacq1uyhuerysqwkwfwa4fm7t7gd';

async function go() {
  const url = document.getElementById('url').value.trim();
  if (!url) return;
  const btn = document.getElementById('btn');
  btn.disabled = true;
  show('pmsg', 'Step 1/3 — Transcribing audio...');
  hide('emsg');
  document.getElementById('clips').style.display = 'none';

  try {
    const r1 = await fetch(SERVER + '/transcribe?youtube_url=' + encodeURIComponent(url));
    if (!r1.ok) throw new Error('Transcription failed: ' + r1.status);
    const t1 = await r1.text();
    let segments = '';
    try { segments = JSON.parse(t1).answer || t1; } catch(e) { segments = t1; }
    if (!segments) throw new Error('No segments from AI');

    show('pmsg', 'Step 2/3 — Starting video cutting...');
    const r2 = await fetch(SERVER + '/process?youtube_url=' + encodeURIComponent(url) + '&segments_text=' + encodeURIComponent(segments));
    if (!r2.ok) throw new Error('Processing failed: ' + r2.status);
    const d2 = await r2.json();
    if (d2.error) throw new Error(d2.error);

    const jobId = d2.job_id;
    show('pmsg', 'Step 3/3 — Cutting clips...');

    const poll = setInterval(async () => {
      try {
        const r3 = await fetch(SERVER + '/status/' + jobId);
        const d3 = await r3.json();
        if (d3.status === 'done') {
          clearInterval(poll);
          btn.disabled = false;
          hide('pmsg');
          showClips(d3.clips);
        } else if (d3.status === 'error') {
          clearInterval(poll);
          btn.disabled = false;
          hide('pmsg');
          show('emsg', d3.error || 'Processing failed');
        } else if (d3.status === 'cutting') {
          show('pmsg', 'Cutting clips... almost done!');
        } else if (d3.status === 'downloading') {
          show('pmsg', 'Downloading video...');
        }
      } catch(e) {
        clearInterval(poll);
        btn.disabled = false;
        show('emsg', 'Lost connection. Is your server running?');
      }
    }, 10000);

  } catch(err) {
    btn.disabled = false;
    hide('pmsg');
    show('emsg', err.message);
  }
}

function showClips(clips) {
  const grid = document.getElementById('clips-grid');
  grid.innerHTML = '';
  document.getElementById('clips-title').textContent = clips.length + ' Study Clips';
  clips.forEach((c, i) => {
    if (!c.url) return;
    grid.innerHTML += '<div class="clip-card"><video controls preload="metadata"><source src="' + c.url + '" type="video/mp4"></video><div class="clip-info"><div><div class="clip-title">Clip ' + (i+1) + ': ' + (c.title||'Topic') + '</div><div class="clip-time">' + (c.from||'') + ' → ' + (c.to||'') + '</div></div><a href="' + c.url + '" download class="dl-btn">⬇ Download</a></div></div>';
  });
  document.getElementById('clips').style.display = 'block';
}

function show(id, msg) {
  const el = document.getElementById(id);
  if (msg) el.textContent = msg;
  el.classList.add('show');
}
function hide(id) { document.getElementById(id).classList.remove('show'); }

document.getElementById('url').addEventListener('keydown', e => { if (e.key === 'Enter') go(); });
</script>
</body>
</html>
